version: "3"

services:
  bunkerweb:
    image: bunkerity/bunkerweb:1.6.0-rc1
    ports:
      - 80:8080/tcp
      - 443:8443/tcp
      - 443:8443/udp
    environment:
      - API_WHITELIST_IP=127.0.0.0/8 10.20.30.0/24
    networks:
      - bw-universe
      - bw-services

  bw-scheduler:
    image: bunkerity/bunkerweb-scheduler:1.6.0-rc1
    depends_on:
      - bunkerweb
    volumes:
      - ./bw-data/plugins:/data/plugins
    environment:
      - BUNKERWEB_INSTANCES=bunkerweb
      - SERVER_NAME=www.example.com
      - API_WHITELIST_IP=127.0.0.0/8 10.20.30.0/24
      - USE_CLAMAV=yes
      - CLAMAV_HOST=clamav
      - LOG_LEVEL=info
      # Serve TLS with a self-signed cert and explicitly enable HTTP/2+HTTP/3 so the
      # h2/h3 e2e cases can negotiate them regardless of any future upstream default
      # change. The self-signed CN defaults to www.example.com.
      - GENERATE_SELF_SIGNED_SSL=yes
      - HTTP2=yes
      - HTTP3=yes
      # A self-signed cert otherwise makes BunkerWeb 301-redirect HTTP->HTTPS in the
      # access phase, which breaks the plain-HTTP test cases (readiness probe, EICAR
      # over http). The h2/h3 cases hit HTTPS directly and are unaffected.
      - AUTO_REDIRECT_HTTP_TO_HTTPS=no
      - USE_BAD_BEHAVIOR=no
      - USE_LIMIT_REQ=no
      - USE_BUNKERNET=no
      - USE_BLACKLIST=no
      - USE_MODSECURITY=no
      - USE_REVERSE_PROXY=yes
      - REVERSE_PROXY_HOST=http://hello:8080
      - REVERSE_PROXY_URL=/
    networks:
      - bw-universe

  clamav:
    image: clamav/clamav:1.4
    volumes:
      - clamav-data:/var/lib/clamav
    networks:
      - bw-universe

  hello:
    image: nginxdemos/nginx-hello
    networks:
      - bw-services

volumes:
  bw-data:
  clamav-data:

networks:
  bw-universe:
    name: bw-universe
    ipam:
      driver: default
      config:
        - subnet: 10.20.30.0/24
  bw-services:
    name: bw-services
