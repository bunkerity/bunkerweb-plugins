services:
  bunkerweb:
    image: bunkerity/bunkerweb:1.6.0-rc1
    ports:
      - 80:8080/tcp
      - 443:8443/tcp
      - 443:8443/udp
    environment:
      - API_WHITELIST_IP=127.0.0.0/8 10.20.30.0/24
    networks:
      - bw-universe
      - bw-services

  bw-scheduler:
    image: bunkerity/bunkerweb-scheduler:1.6.0-rc1
    depends_on:
      - bunkerweb
    volumes:
      - ./bw-data/plugins:/data/plugins
    environment:
      - BUNKERWEB_INSTANCES=bunkerweb
      - SERVER_NAME=www.example.com
      - API_WHITELIST_IP=127.0.0.0/8 10.20.30.0/24
      - USE_SENTINELONE=yes
      # Point the plugin at the local mock SentinelOne API (deterministic, no real
      # tenant/token). The base URL includes the /web/api/v2.1 path, like a real
      # console. To exercise a real tenant locally instead, set SENTINELONE_API_URL
      # to https://<console>/web/api/v2.1 and SENTINELONE_API_TOKEN to a real token.
      - SENTINELONE_API_TOKEN=dummy
      - SENTINELONE_API_URL=http://mock:8080/web/api/v2.1
      - LOG_LEVEL=info
      # Serve TLS with a self-signed cert and explicitly enable HTTP/2+HTTP/3 so the
      # h2/h3 e2e cases can negotiate them regardless of any future upstream default
      # change. The self-signed CN defaults to www.example.com. The HTTP/2 case is
      # always asserted; the HTTP/3 case is BEST-EFFORT - only asserted when the test
      # client's curl was built with HTTP/3 (Ubuntu's curl and the CI runner are not),
      # otherwise skipped. h2 and h3 share the same buffered Lua path.
      - GENERATE_SELF_SIGNED_SSL=yes
      - HTTP2=yes
      - HTTP3=yes
      # The self-signed cert otherwise makes BunkerWeb 301-redirect HTTP->HTTPS,
      # which runs in the access phase BEFORE sentinelone and would break the
      # plain-HTTP test cases (readiness probe, EICAR/IP over http). The h2/h3
      # cases hit HTTPS directly and are unaffected.
      - AUTO_REDIRECT_HTTP_TO_HTTPS=no
      # Trust X-Forwarded-For from the test client so the IP-deny case can
      # present a global IP (the real docker client IP is private and would
      # skip the IP scan via ip_is_global). File-scan cases send no XFF, so they
      # keep the private client IP and only exercise the file path.
      - USE_REAL_IP=yes
      - REAL_IP_FROM=0.0.0.0/0
      - REAL_IP_HEADER=X-Forwarded-For
      - REAL_IP_RECURSIVE=no
      - USE_BAD_BEHAVIOR=no
      - USE_LIMIT_REQ=no
      - USE_LIMIT_CONN=no
      - USE_BUNKERNET=no
      - USE_BLACKLIST=no
      - USE_MODSECURITY=no
      - USE_REVERSE_PROXY=yes
      - REVERSE_PROXY_HOST=http://hello:8080
      - REVERSE_PROXY_URL=/
    networks:
      - bw-universe

  hello:
    image: nginxdemos/nginx-hello
    networks:
      - bw-services

  # Mock SentinelOne API: deterministic responses keyed on path + ?value= arg.
  mock:
    image: nginx:alpine
    volumes:
      - ./s1-mock.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - bw-services

volumes:
  bw-data:

networks:
  bw-services:
  bw-universe:
    ipam:
      driver: default
      config:
        - subnet: 10.20.30.0/24
