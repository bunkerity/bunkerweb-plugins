# Mock SentinelOne Management API v2.1. Deterministic replacement for the real
# console API so CI does not depend on owning a SentinelOne tenant / a token /
# network. The plugin queries, under the base path /web/api/v2.1:
#   GET /system/info                     (init_worker + /sentinelone/ping probe)
#   GET /hashes/<sha1>/reputation        (file scan)
#   GET /threat-intelligence/iocs?type=ipv4&value=<ip>   (IP scan)
#
# __EICAR_SHA1__ is replaced by .tests/sentinelone.sh with the real SHA1 of the
# downloaded EICAR file, so the mock can't drift from what resty.sha1 produces.
server {
    listen 8080;
    default_type application/json;
    # Log every request to stdout so tests can assert the plugin actually
    # reached the mock (docker compose logs mock).
    access_log /dev/stdout;

    # Connectivity probe used by init_worker and POST /sentinelone/ping.
    location = /web/api/v2.1/system/info {
        return 200 '{"data":{"build":"mock","latestAgentVersion":"0.0.0"}}';
    }

    # EICAR test-file SHA1 -> reputation rank 10 (malicious) so the plugin denies.
    location = /web/api/v2.1/hashes/__EICAR_SHA1__/reputation {
        return 200 '{"data":{"rank":10,"verdict":"black"}}';
    }

    # Any other file hash -> 404 (plugin treats this as "unknown" = clean).
    location ~ ^/web/api/v2\.1/hashes/.+/reputation$ {
        return 404 '{"errors":[{"code":4040010,"title":"Hash not found"}]}';
    }

    # Threat-intelligence IOC lookup. The queried value is in the ?value= arg
    # (not the path), so branch on $arg_value:
    #   1.2.3.4 -> a matching IOC (deny)
    #   5.5.5.5 -> 500 (API error -> plugin must FAIL OPEN)
    #   6.6.6.6 -> 200 with a non-JSON body (parse error -> plugin must FAIL OPEN)
    #   anything else -> empty data array (clean)
    location = /web/api/v2.1/threat-intelligence/iocs {
        if ($arg_value = "5.5.5.5") {
            return 500 '{"errors":[{"code":5000000,"title":"Internal error"}]}';
        }
        if ($arg_value = "6.6.6.6") {
            return 200 'this is not json';
        }
        if ($arg_value = "1.2.3.4") {
            return 200 '{"data":[{"uuid":"abc-123","type":"ipv4","value":"1.2.3.4","source":"mock"}],"pagination":{"totalItems":1}}';
        }
        return 200 '{"data":[],"pagination":{"totalItems":0}}';
    }

    location / {
        return 404 '{"errors":[{"code":4040000,"title":"Not found"}]}';
    }
}
