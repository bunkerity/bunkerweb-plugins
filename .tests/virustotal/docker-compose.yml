services:
  bunkerweb:
    image: bunkerity/bunkerweb:1.6.0-rc1
    ports:
      - 80:8080/tcp
      - 443:8443/tcp
      - 443:8443/udp
    environment:
      - API_WHITELIST_IP=127.0.0.0/8 10.20.30.0/24
    networks:
      - bw-universe
      - bw-services

  bw-scheduler:
    image: bunkerity/bunkerweb-scheduler:1.6.0-rc1
    depends_on:
      - bunkerweb
    volumes:
      - ./bw-data/plugins:/data/plugins
    environment:
      - BUNKERWEB_INSTANCES=bunkerweb
      - SERVER_NAME=www.example.com
      - API_WHITELIST_IP=127.0.0.0/8 10.20.30.0/24
      - USE_VIRUSTOTAL=yes
      # Point the plugin at the local mock VT API (deterministic, no real key).
      - VIRUSTOTAL_API_KEY=dummy
      - VIRUSTOTAL_API_URL=http://mock:8080
      - LOG_LEVEL=info
      # Serve TLS with a self-signed cert and explicitly enable HTTP/2+HTTP/3 so the
      # h2/h3 e2e cases can negotiate them regardless of any future upstream default
      # change. The self-signed CN defaults to www.example.com.
      - GENERATE_SELF_SIGNED_SSL=yes
      - HTTP2=yes
      - HTTP3=yes
      # A self-signed cert otherwise makes BunkerWeb 301-redirect HTTP->HTTPS in the
      # access phase, which breaks the plain-HTTP test cases (readiness probe, EICAR/IP
      # over http). The h2/h3 cases hit HTTPS directly and are unaffected.
      - AUTO_REDIRECT_HTTP_TO_HTTPS=no
      # Trust X-Forwarded-For from the test client so the IP-deny case can
      # present a global IP (the real docker client IP is private and would
      # skip the IP scan via ip_is_global). File-scan cases send no XFF, so they
      # keep the private client IP and only exercise the file path.
      - USE_REAL_IP=yes
      - REAL_IP_FROM=0.0.0.0/0
      - REAL_IP_HEADER=X-Forwarded-For
      - REAL_IP_RECURSIVE=no
      - USE_BAD_BEHAVIOR=no
      - USE_LIMIT_REQ=no
      - USE_LIMIT_CONN=no
      - USE_BUNKERNET=no
      - USE_BLACKLIST=no
      - USE_MODSECURITY=no
      - USE_REVERSE_PROXY=yes
      - REVERSE_PROXY_HOST=http://hello:8080
      - REVERSE_PROXY_URL=/
    networks:
      - bw-universe

  hello:
    image: nginxdemos/nginx-hello
    networks:
      - bw-services

  # Mock VirusTotal API: deterministic responses keyed on the request path.
  mock:
    image: nginx:alpine
    volumes:
      - ./vt-mock.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - bw-services

volumes:
  bw-data:

networks:
  bw-services:
  bw-universe:
    ipam:
      driver: default
      config:
        - subnet: 10.20.30.0/24
